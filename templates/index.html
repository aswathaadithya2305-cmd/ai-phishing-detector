<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Phishing Detector</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->

<body>
    <link rel="sty

<div class="background-animation"></div>

<div class="container-box">

    <div class="logo-section">
        <i class="fa-solid fa-shield-halved"></i>
        <h1>AI Phishing Detector</h1>
        <p>Analyze suspicious URLs using AI-powered threat detection</p>
    </div>

    <form action="/predict" method="POST">

        <div class="input-group">
            <input type="text" name="url" placeholder="Enter suspicious URL here..." required>
        </div>

        <button type="submit" class="scan-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
            Scan URL
        </button>

    </form>

    {% if prediction %}

    <div class="result-card">

        <h2>Detection Result</h2>

        {% if prediction == 'Safe' %}
            <p class="safe">SAFE WEBSITE</p>
        {% else %}
            <p class="danger">PHISHING WEBSITE DETECTED</p>
        {% endif %}

        <div class="risk-meter">
            <div class="risk-fill"></div>
        </div>

    </div>

    {% endif %}

</div>

</body>
</html>
